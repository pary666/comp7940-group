name: AWS EC2 Deploy (Docker)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_KEY }}

      - name: Add EC2 to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Build Docker image
        run: |
          docker build -t chatbot:latest .

      - name: Save Docker image to tar
        run: |
          docker save -o chatbot.tar chatbot:latest

      - name: Copy tar to EC2
        run: |
          scp chatbot.tar ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~

      - name: Deploy on EC2
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            docker load -i ~/chatbot.tar

            docker rm -f chatbot-container 2>/dev/null || true

            docker run -d --restart=always --name chatbot-container \
              -v ~/chatbot_comp7940/comp7940-group/config.ini:/app/config.ini \
              chatbot:latest
          EOF